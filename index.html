<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Flowday — 管理时间，也管理生活</title><meta name="description" content="Todo、日历与习惯追踪"><style>
:root{--ink:#171717;--muted:#999;--paper:#f7f7f6;--line:#e9e9e7;--purple:#9f7aea}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:14px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}button,input{font:inherit}.app{display:grid;grid-template-columns:78px 250px minmax(0,1fr);min-height:100vh}.rail{position:fixed;inset:0 auto 0 0;width:78px;background:#f0f0ef;border-right:1px solid #dedede;display:flex;flex-direction:column;align-items:center;padding:28px 0;gap:20px}.logo{display:grid;place-items:center;width:42px;height:42px;border-radius:13px;background:#171717;color:#fff;font:700 20px Georgia;margin-bottom:22px}.nav{display:grid;gap:22px}.nav button{display:grid;place-items:center;width:44px;height:44px;border:0;background:transparent;border-radius:12px;color:#9a9a9a;font-size:22px;cursor:pointer}.nav button.on{background:#5774ff;color:#fff;box-shadow:0 6px 14px #5774ff2b}.nav button span{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}.status{position:fixed;inset:0 auto 0 78px;width:250px;background:#fff;border-right:1px solid var(--line);padding:27px 16px;overflow:auto}.smart,.lists{display:grid;gap:6px}.smart button,.lists button{display:grid;grid-template-columns:34px 1fr auto;align-items:center;width:100%;border:0;background:transparent;padding:11px 12px;border-radius:12px;text-align:left;cursor:pointer;font-size:16px}.smart button.on,.lists button.on{background:#f2f2f2}.smart i,.lists i{font-style:normal;font-size:19px}.smart b,.lists b{font-weight:400;color:#aaa;font-size:13px}.divider{height:1px;background:#eee;margin:22px 4px}.label{color:#bbb;font-size:13px;font-weight:650;margin:0 12px 12px}.dot{width:8px;height:8px;border-radius:50%;justify-self:end;margin-right:8px}.list-meta{display:flex;align-items:center;gap:10px}.main{grid-column:3;max-width:1050px;width:100%;margin:auto;padding:55px 6vw 80px}header{display:flex;justify-content:space-between;margin-bottom:36px}h1{font:500 38px Georgia,"Songti SC",serif;margin:5px 0 8px}.eyebrow{font-size:10px;letter-spacing:1.5px;color:var(--purple)}p{margin:0;color:var(--muted)}.count b{font:400 34px Georgia}.card{background:white;border:1px solid var(--line);border-radius:15px;overflow:hidden}.add{display:flex;gap:8px;margin-bottom:20px}.add input{flex:1;padding:13px;border:1px solid var(--line);border-radius:10px;background:white}.add input[type=date]{max-width:150px}.add button,.habit-add button{border:0;background:#242323;color:white;border-radius:10px;padding:0 18px}.task{display:flex;align-items:center;gap:13px;padding:15px 18px;border-bottom:1px solid #efede9}.task:last-child{border:0}.check{width:22px;height:22px;border:1.5px solid #c9c5bf;background:white;border-radius:50%;color:white}.done .check{background:#8c8882}.done strong{text-decoration:line-through;color:#aaa}.task div{flex:1}.task small{display:block;color:#aaa;margin-top:5px}.del{border:0;background:transparent;color:#aaa;font-size:18px}.calhead,.cal{display:grid;grid-template-columns:repeat(7,minmax(0,1fr))}.calhead span{text-align:center;padding:12px;background:#faf9f7;color:#999;font-size:11px}.day{min-width:0;min-height:110px;padding:10px;border-top:1px solid #eee;border-right:1px solid #eee}.day:nth-child(7n){border-right:0}.chip{display:block;max-width:100%;margin-top:8px;padding:6px;background:#ece9ff;color:#5546bd;border-left:3px solid var(--purple);border-radius:4px;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.habit-add{display:flex;gap:8px;margin-bottom:20px}.habit-add input{flex:1;padding:13px;border:1px solid var(--line);border-radius:10px}.habit-row{display:grid;grid-template-columns:1fr repeat(7,52px);align-items:center;padding:15px 20px;border-bottom:1px solid #eee}.habit-row button{justify-self:center;width:28px;height:28px;border:1px solid #ddd;background:white;border-radius:50%;color:white}.habit-row button.hit{background:var(--c);border-color:var(--c)}.habit-row i{display:inline-block;width:7px;height:24px;background:var(--c);border-radius:3px;margin-right:10px;vertical-align:middle}.tabs button{border:0;padding:8px 12px}.tabs .on{background:white;border-radius:7px}.month{display:grid;grid-template-columns:repeat(16,1fr);gap:5px;max-width:500px}.month i{aspect-ratio:1;border-radius:3px;background:#ebe9e5}.month i.hit{background:var(--c);opacity:.65}.hide{display:none!important}
@media(max-width:820px){.app{display:block}.rail{z-index:8;inset:auto 0 0;width:100%;height:66px;padding:8px 18px;display:block;border-top:1px solid #ddd}.logo{display:none}.nav{display:flex;justify-content:space-around}.nav button{width:54px;height:48px}.status{position:static;width:100%;height:auto;padding:18px;background:#fff}.smart{display:grid;grid-template-columns:repeat(4,1fr)}.smart button{display:flex;flex-direction:column;gap:5px;text-align:center;font-size:12px}.smart b{display:none}.divider{margin:12px 0}.lists{display:flex;overflow:auto}.lists button{min-width:128px}.main{padding:30px 18px 95px}.count{display:none}.day{min-height:78px;padding:5px}.chip{font-size:9px;padding:4px 3px}.habit-row{grid-template-columns:120px repeat(7,1fr);padding:12px 8px}}
</style></head><body><div class="app"><aside class="rail"><div class="logo">F</div><nav class="nav"><button class="on" data-view="todo" aria-label="Todo">✓<span>Todo</span></button><button data-view="calendar" aria-label="日历">▦<span>日历</span></button><button data-view="habits" aria-label="习惯">✤<span>习惯</span></button></nav></aside><aside class="status" id="status"><div class="smart" id="smart"></div><div class="divider"></div><div class="label">清单</div><div class="lists" id="folders"></div></aside><main class="main">
<section id="todo"><header><div><div class="eyebrow" id="todoEyebrow">TODAY</div><h1 id="todoTitle">今天</h1><p id="todoDesc">把脑海里的事情放下来，再从容安排。</p></div><div class="count"><b id="count">0</b> 件待完成</div></header><form class="add" id="taskForm"><input id="taskInput" placeholder="添加一个任务，按回车保存…" required><input id="dateInput" type="date"><button>添加</button></form><div class="card" id="tasks"></div></section>
<section id="calendar" class="hide"><header><div><div class="eyebrow">CALENDAR</div><h1>2026年 7月</h1><p>所有设置了截止日期的 Todo 都会出现在这里。</p></div></header><div class="card"><div class="calhead"><span>周一</span><span>周二</span><span>周三</span><span>周四</span><span>周五</span><span>周六</span><span>周日</span></div><div class="cal" id="cal"></div></div></section>
<section id="habits" class="hide"><header><div><div class="eyebrow">ROUTINES</div><h1>习惯</h1><p>小小的重复，最终会变成生活本身。</p></div><div class="tabs"><button class="on" data-mode="week">周视图</button><button data-mode="month">月视图</button></div></header><form class="habit-add" id="habitForm"><input id="habitInput" placeholder="想养成什么新习惯？" required><button>创建习惯</button></form><div class="card" id="habitList"></div></section>
</main></div><script>
const defaults=[{id:1,title:'整理季度目标',folder:'工作',due:'2026-07-10',done:false},{id:2,title:'预约年度体检',folder:'生活',due:'2026-07-12',done:false},{id:3,title:'读完《掌控习惯》第三章',folder:'成长',done:true},{id:4,title:'准备周一产品评审',folder:'工作',due:'2026-07-13',done:false}],habitDefaults=[{id:1,name:'晨间阅读',color:'#6f5cff',days:[1,1,0,1,1,0,0]},{id:2,name:'运动 30 分钟',color:'#ff8a5b',days:[0,1,1,0,1,0,0]},{id:3,name:'记录今日三件好事',color:'#2bb78c',days:[1,1,1,1,0,0,0]}];let tasks=JSON.parse(localStorage.getItem('flowday-tasks')||'null')||defaults,habits=JSON.parse(localStorage.getItem('flowday-habits')||'null')||habitDefaults,folder='今天',mode='week';const statusPanel=document.getElementById('status'),save=()=>{localStorage.setItem('flowday-tasks',JSON.stringify(tasks));localStorage.setItem('flowday-habits',JSON.stringify(habits))};
document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-view]').forEach(x=>x.classList.remove('on'));b.classList.add('on');['todo','calendar','habits'].forEach(v=>document.getElementById(v).classList.toggle('hide',v!==b.dataset.view));statusPanel.classList.toggle('hide',b.dataset.view!=='todo');document.querySelector('.app').style.gridTemplateColumns=b.dataset.view==='todo'?'78px 250px minmax(0,1fr)':'78px minmax(0,1fr)';document.querySelector('.main').style.gridColumn=b.dataset.view==='todo'?'3':'2';if(b.dataset.view==='calendar')renderCal()});
function pick(f){folder=f;renderTasks()}function renderTasks(){const today='2026-07-13',weekEnd='2026-07-19',smartItems=[['今天','▣',tasks.filter(t=>t.due===today).length],['最近 7 天','7',tasks.filter(t=>t.due>=today&&t.due<=weekEnd).length],['收集箱','⌄',tasks.filter(t=>t.folder==='收集箱').length],['摘要','=',tasks.filter(t=>!t.done).length]];smart.innerHTML=smartItems.map(([f,icon,n])=>`<button class="${f===folder?'on':''}" onclick="pick('${f}')"><i>${icon}</i><span>${f}</span><b>${n}</b></button>`).join('');const fs=[['工作','#b993f6'],['生活','#54becb'],['健身','#f4ce89'],['成长','#f2a48f'],['月度复盘','#7d89b4']];folders.innerHTML=fs.map(([f,c])=>`<button class="${f===folder?'on':''}" onclick="pick('${f}')"><i>☰</i><span>${f}</span><span class="list-meta"><i class="dot" style="background:${c}"></i><b>${tasks.filter(t=>t.folder===f).length||''}</b></span></button>`).join('');let list=tasks;if(folder==='今天')list=tasks.filter(t=>t.due===today);else if(folder==='最近 7 天')list=tasks.filter(t=>t.due>=today&&t.due<=weekEnd);else if(folder==='摘要')list=tasks.filter(t=>!t.done);else list=tasks.filter(t=>t.folder===folder);const titles={今天:['TODAY','今天'], '最近 7 天':['UPCOMING','最近 7 天'],收集箱:['INBOX','收集箱'],摘要:['OVERVIEW','摘要']};todoEyebrow.textContent=(titles[folder]||['LIST',folder])[0];todoTitle.textContent=(titles[folder]||['LIST',folder])[1];count.textContent=list.filter(t=>!t.done).length;document.getElementById('tasks').innerHTML=list.length?list.map(t=>`<div class="task ${t.done?'done':''}"><button class="check" onclick="toggle(${t.id})">${t.done?'✓':''}</button><div><strong>${t.title.replace(/</g,'&lt;')}</strong><small>${t.folder}${t.due?' · 截止 '+t.due.slice(5).replace('-','/'):''}</small></div><button class="del" onclick="removeTask(${t.id})">×</button></div>`).join(''):'<div class="task">这里还没有任务</div>'}function toggle(id){tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t);save();renderTasks()}function removeTask(id){tasks=tasks.filter(t=>t.id!==id);save();renderTasks()}taskForm.onsubmit=e=>{e.preventDefault();const smartFolders=['今天','最近 7 天','摘要'];tasks.unshift({id:Date.now(),title:taskInput.value.trim(),folder:smartFolders.includes(folder)?'收集箱':folder,due:dateInput.value||undefined,done:false});taskInput.value='';dateInput.value='';save();renderTasks()};
function renderCal(){let html='';for(let i=0;i<35;i++){const d=i<2?29+i:i-1,inM=i>=2,date=`2026-07-${String(d).padStart(2,'0')}`;html+=`<div class="day" style="${!inM?'color:#bbb;background:#fafafa':''}"><b>${d}</b>${inM?tasks.filter(t=>t.due===date).map(t=>`<span class="chip" title="${t.title.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}">${t.title}</span>`).join(''):''}</div>`}cal.innerHTML=html}
function renderHabits(){habitList.innerHTML=habits.map(h=>`<div class="habit-row" style="--c:${h.color}"><span><i></i>${h.name}</span>${mode==='week'?h.days.map((d,i)=>`<button class="${d?'hit':''}" onclick="hit(${h.id},${i})">${d?'✓':''}</button>`).join(''):`<div class="month">${Array.from({length:31},(_,i)=>`<i class="${(i+h.id)%4?'hit':''}"></i>`).join('')}</div>`}</div>`).join('')}function hit(id,i){habits=habits.map(h=>h.id===id?{...h,days:h.days.map((d,j)=>j===i?+!d:d)}:h);save();renderHabits()}habitForm.onsubmit=e=>{e.preventDefault();const cs=['#6f5cff','#ff8a5b','#2bb78c','#e9b949'];habits.push({id:Date.now(),name:habitInput.value.trim(),color:cs[habits.length%4],days:[0,0,0,0,0,0,0]});habitInput.value='';save();renderHabits()};document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-mode]').forEach(x=>x.classList.remove('on'));b.classList.add('on');mode=b.dataset.mode;renderHabits()});renderTasks();renderHabits();
</script></body></html>
