<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Flowday — 管理时间，也管理生活</title><meta name="description" content="Todo、日历与习惯追踪"><style>
:root{--ink:#242323;--muted:#8b8883;--paper:#f6f5f2;--line:#e8e5df;--purple:#6f5cff}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:14px -apple-system,BlinkMacSystemFont,"PingFang SC",sans-serif}button,input{font:inherit}.app{display:grid;grid-template-columns:230px 1fr;min-height:100vh}.side{position:fixed;width:230px;height:100vh;padding:30px 20px;background:#eeece8;border-right:1px solid #dedbd5;display:flex;flex-direction:column}.brand{font:700 20px Georgia;margin:0 8px 34px}.brand i{display:inline-grid;place-items:center;width:30px;height:30px;margin-right:10px;border-radius:9px;background:#242323;color:#fff}.nav{display:grid;gap:6px}.nav button{border:0;background:transparent;text-align:left;padding:12px;border-radius:10px;color:#706b65;cursor:pointer}.nav button.on{background:white;color:#242323;font-weight:650}.foot{margin-top:auto;border-top:1px solid #d8d4ce;padding:16px 8px 0;font-size:11px;color:#8b8883}.main{grid-column:2;max-width:1100px;width:100%;margin:auto;padding:55px 6vw 80px}header{display:flex;justify-content:space-between;margin-bottom:36px}h1{font:500 38px Georgia,"Songti SC",serif;margin:5px 0 8px}.eyebrow{font-size:10px;letter-spacing:1.5px;color:var(--purple)}p{margin:0;color:var(--muted)}.count b{font:400 34px Georgia}.layout{display:grid;grid-template-columns:170px 1fr;gap:28px}.folders button{display:flex;justify-content:space-between;width:100%;border:0;background:transparent;padding:11px;border-radius:9px;color:#6e6963;cursor:pointer}.folders button.on{background:#e9e6ff;color:#5144bd;font-weight:650}.card{background:white;border:1px solid var(--line);border-radius:15px;overflow:hidden}.add{display:flex;gap:8px;margin-bottom:20px}.add input{flex:1;padding:13px;border:1px solid var(--line);border-radius:10px;background:white}.add input[type=date]{max-width:150px}.add button,.habit-add button{border:0;background:#242323;color:white;border-radius:10px;padding:0 18px}.task{display:flex;align-items:center;gap:13px;padding:15px 18px;border-bottom:1px solid #efede9}.task:last-child{border:0}.check{width:22px;height:22px;border:1.5px solid #c9c5bf;background:white;border-radius:50%;color:white}.done .check{background:#8c8882}.done strong{text-decoration:line-through;color:#aaa}.task div{flex:1}.task small{display:block;color:#aaa;margin-top:5px}.del{border:0;background:transparent;color:#aaa;font-size:18px}.calhead,.cal{display:grid;grid-template-columns:repeat(7,minmax(0,1fr))}.calhead span{text-align:center;padding:12px;background:#faf9f7;color:#999;font-size:11px}.day{min-width:0;min-height:110px;padding:10px;border-top:1px solid #eee;border-right:1px solid #eee}.day:nth-child(7n){border-right:0}.chip{display:block;max-width:100%;margin-top:8px;padding:6px;background:#ece9ff;color:#5546bd;border-left:3px solid var(--purple);border-radius:4px;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.habit-add{display:flex;gap:8px;margin-bottom:20px}.habit-add input{flex:1;padding:13px;border:1px solid var(--line);border-radius:10px}.habit-row{display:grid;grid-template-columns:1fr repeat(7,52px);align-items:center;padding:15px 20px;border-bottom:1px solid #eee}.habit-row button{justify-self:center;width:28px;height:28px;border:1px solid #ddd;background:white;border-radius:50%;color:white}.habit-row button.hit{background:var(--c);border-color:var(--c)}.habit-row i{display:inline-block;width:7px;height:24px;background:var(--c);border-radius:3px;margin-right:10px;vertical-align:middle}.tabs button{border:0;padding:8px 12px}.tabs .on{background:white;border-radius:7px}.month{display:grid;grid-template-columns:repeat(16,1fr);gap:5px;max-width:500px}.month i{aspect-ratio:1;border-radius:3px;background:#ebe9e5}.month i.hit{background:var(--c);opacity:.65}.hide{display:none!important}
@media(max-width:760px){.app{display:block}.side{z-index:5;bottom:0;top:auto;width:100%;height:65px;padding:8px 15px;border-top:1px solid #ddd}.brand,.foot{display:none}.nav{display:flex;justify-content:space-around}.nav button{padding:12px 20px}.main{padding:35px 18px 95px}.layout{display:block}.folders{display:flex;overflow:auto;margin-bottom:18px}.folders button{white-space:nowrap}.count{display:none}.day{min-height:78px;padding:5px}.chip{font-size:9px;padding:4px 3px}.habit-row{grid-template-columns:120px repeat(7,1fr);padding:12px 8px}}
</style></head><body><div class="app"><aside class="side"><div class="brand"><i>F</i>Flowday</div><nav class="nav"><button class="on" data-view="todo">✓　Todo</button><button data-view="calendar">□　日历</button><button data-view="habits">↗　习惯</button></nav><div class="foot">专注的一天<br>保持自己的节奏</div></aside><main class="main">
<section id="todo"><header><div><div class="eyebrow">TODAY</div><h1>Todo 收集</h1><p>把脑海里的事情放下来，再从容安排。</p></div><div class="count"><b id="count">0</b> 件待完成</div></header><div class="layout"><div class="folders" id="folders"></div><div><form class="add" id="taskForm"><input id="taskInput" placeholder="添加一个任务，按回车保存…" required><input id="dateInput" type="date"><button>添加</button></form><div class="card" id="tasks"></div></div></div></section>
<section id="calendar" class="hide"><header><div><div class="eyebrow">CALENDAR</div><h1>2026年 7月</h1><p>所有设置了截止日期的 Todo 都会出现在这里。</p></div></header><div class="card"><div class="calhead"><span>周一</span><span>周二</span><span>周三</span><span>周四</span><span>周五</span><span>周六</span><span>周日</span></div><div class="cal" id="cal"></div></div></section>
<section id="habits" class="hide"><header><div><div class="eyebrow">ROUTINES</div><h1>习惯</h1><p>小小的重复，最终会变成生活本身。</p></div><div class="tabs"><button class="on" data-mode="week">周视图</button><button data-mode="month">月视图</button></div></header><form class="habit-add" id="habitForm"><input id="habitInput" placeholder="想养成什么新习惯？" required><button>创建习惯</button></form><div class="card" id="habitList"></div></section>
</main></div><script>
const defaults=[{id:1,title:'整理季度目标',folder:'工作',due:'2026-07-10',done:false},{id:2,title:'预约年度体检',folder:'生活',due:'2026-07-12',done:false},{id:3,title:'读完《掌控习惯》第三章',folder:'成长',done:true},{id:4,title:'准备周一产品评审',folder:'工作',due:'2026-07-13',done:false}],habitDefaults=[{id:1,name:'晨间阅读',color:'#6f5cff',days:[1,1,0,1,1,0,0]},{id:2,name:'运动 30 分钟',color:'#ff8a5b',days:[0,1,1,0,1,0,0]},{id:3,name:'记录今日三件好事',color:'#2bb78c',days:[1,1,1,1,0,0,0]}];let tasks=JSON.parse(localStorage.getItem('flowday-tasks')||'null')||defaults,habits=JSON.parse(localStorage.getItem('flowday-habits')||'null')||habitDefaults,folder='全部任务',mode='week';const save=()=>{localStorage.setItem('flowday-tasks',JSON.stringify(tasks));localStorage.setItem('flowday-habits',JSON.stringify(habits))};
document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-view]').forEach(x=>x.classList.remove('on'));b.classList.add('on');['todo','calendar','habits'].forEach(v=>document.getElementById(v).classList.toggle('hide',v!==b.dataset.view));if(b.dataset.view==='calendar')renderCal()});
function renderTasks(){const fs=['全部任务','工作','生活','成长'];folders.innerHTML=fs.map(f=>`<button class="${f===folder?'on':''}" onclick="folder='${f}';renderTasks()"><span>${f}</span><b>${f==='全部任务'?tasks.length:tasks.filter(t=>t.folder===f).length}</b></button>`).join('');const list=folder==='全部任务'?tasks:tasks.filter(t=>t.folder===folder);count.textContent=tasks.filter(t=>!t.done).length;document.getElementById('tasks').innerHTML=list.length?list.map(t=>`<div class="task ${t.done?'done':''}"><button class="check" onclick="toggle(${t.id})">${t.done?'✓':''}</button><div><strong>${t.title.replace(/</g,'&lt;')}</strong><small>${t.folder}${t.due?' · 截止 '+t.due.slice(5).replace('-','/'):''}</small></div><button class="del" onclick="removeTask(${t.id})">×</button></div>`).join(''):'<div class="task">这个文件夹还是空的</div>'}function toggle(id){tasks=tasks.map(t=>t.id===id?{...t,done:!t.done}:t);save();renderTasks()}function removeTask(id){tasks=tasks.filter(t=>t.id!==id);save();renderTasks()}taskForm.onsubmit=e=>{e.preventDefault();tasks.unshift({id:Date.now(),title:taskInput.value.trim(),folder:folder==='全部任务'?'收集箱':folder,due:dateInput.value||undefined,done:false});taskInput.value='';dateInput.value='';save();renderTasks()};
function renderCal(){let html='';for(let i=0;i<35;i++){const d=i<2?29+i:i-1,inM=i>=2,date=`2026-07-${String(d).padStart(2,'0')}`;html+=`<div class="day" style="${!inM?'color:#bbb;background:#fafafa':''}"><b>${d}</b>${inM?tasks.filter(t=>t.due===date).map(t=>`<span class="chip" title="${t.title.replace(/&/g,'&amp;').replace(/"/g,'&quot;')}">${t.title}</span>`).join(''):''}</div>`}cal.innerHTML=html}
function renderHabits(){habitList.innerHTML=habits.map(h=>`<div class="habit-row" style="--c:${h.color}"><span><i></i>${h.name}</span>${mode==='week'?h.days.map((d,i)=>`<button class="${d?'hit':''}" onclick="hit(${h.id},${i})">${d?'✓':''}</button>`).join(''):`<div class="month">${Array.from({length:31},(_,i)=>`<i class="${(i+h.id)%4?'hit':''}"></i>`).join('')}</div>`}</div>`).join('')}function hit(id,i){habits=habits.map(h=>h.id===id?{...h,days:h.days.map((d,j)=>j===i?+!d:d)}:h);save();renderHabits()}habitForm.onsubmit=e=>{e.preventDefault();const cs=['#6f5cff','#ff8a5b','#2bb78c','#e9b949'];habits.push({id:Date.now(),name:habitInput.value.trim(),color:cs[habits.length%4],days:[0,0,0,0,0,0,0]});habitInput.value='';save();renderHabits()};document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-mode]').forEach(x=>x.classList.remove('on'));b.classList.add('on');mode=b.dataset.mode;renderHabits()});renderTasks();renderHabits();
</script></body></html>
